# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 11
      uses: actions/setup-java@v1
      with:
        java-version: 11
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    - name: Lines of Code Badge
      # You may pin to the exact commit or the version.
      # uses: shadowmoose/GHA-LoC-Badge@8c8191e02ebe2e4b4764f4711228bddcaeb88f19
      uses: shadowmoose/GHA-LoC-Badge@1.0.0
    - name: JaCoCo Report
      # You may pin to the exact commit or the version.
      # uses: Madrapps/jacoco-report@67036d804c34935864dfef774aa6c6d3924c021d
      uses: Madrapps/jacoco-report@v1.1
      with:
        # Path of the generated xml file
        path: target/site/jacoco/jacoco.xml
        # Github personal token to add commits to Pull Request
        token: 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
        # The minimum code coverage that is required to pass for overall project
        min-coverage-overall: 80
        # The minimum code coverage that is required to pass for changed files
        min-coverage-changed-files: 80
        # Run the action in debug mode and get debug logs printed in console
        debug-mode: false
    - name: jacoco-badge-generator
      # You may pin to the exact commit or the version.
      # uses: cicirello/jacoco-badge-generator@d1bf1a14cc2a171191fb3dc5d48cd1a9f4210008
      uses: cicirello/jacoco-badge-generator@v2.0.1
      with:
        # Full path, relative to the root of the repository, to the jacoco csv file, including filename
        jacoco-csv-file: target/site/jacoco/jacoco.csv
        # The directory for storing badges, relative to the root of the repository.
        badges-directory: .github/badges
        # The filename of the coverage badge.
        coverage-badge-filename: jacoco.svg
        # The filename of the branches coverage badge.
        branches-badge-filename: branches.svg
        # Controls whether or not to generate the coverage badge.
        generate-coverage-badge: true
